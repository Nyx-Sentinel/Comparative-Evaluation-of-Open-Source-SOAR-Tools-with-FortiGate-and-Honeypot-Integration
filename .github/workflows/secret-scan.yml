name: Secret Scan

on: [push, pull_request]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Scan for secrets
        run: |
          echo "Checking for exposed API keys..."
          if grep -r "YOUR_" . --include="*.py" --include="*.sh" --include="*.conf" | grep -v ".gitignore" | grep -v "SENSITIVE_DATA.md"; then
            echo "Placeholders found — good, no real keys exposed"
          fi
          # Fail if real key patterns found
          if grep -rE "[a-f0-9]{80}" . --include="*.py" 2>/dev/null; then
            echo "WARNING: Possible API key detected"
            exit 1
          fi
