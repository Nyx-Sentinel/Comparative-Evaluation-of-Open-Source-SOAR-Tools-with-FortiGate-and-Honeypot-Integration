# =============================================================
# SOAR Machine — Logstash Pipeline
# File: /etc/logstash/conf.d/thesis.conf
#
# Receives:
#   - Beats input on port 5044 (from T-Pot Filebeat if configured)
#   - Syslog input on port 514/udp (from FortiGate)
#
# Outputs to BOTH platforms simultaneously:
#   - Shuffle via HTTP webhook
#   - Wazuh manager via TCP on port 1514
# =============================================================

input {
  beats {
    port => 5044
  }
  syslog {
    port => 514
    type => "fortigate"
  }
}

filter {
  # Parse FortiGate syslog key=value format
  if [type] == "fortigate" {
    kv {
      source => "message"
      field_split => " "
      value_split => "="
    }
    # Normalize source IP field name
    if [srcip] {
      mutate {
        rename => { "srcip" => "src_ip" }
      }
    }
    if [dstip] {
      mutate {
        rename => { "dstip" => "dest_ip" }
      }
    }
  }
}

output {
  # Output 1: Shuffle SOAR via webhook
  http {
    url => "http://localhost:3001/api/v1/hooks/webhook_ca7036b6-fc1b-41c2-92db-66295f932188"
    http_method => "post"
    format => "json"
    content_type => "application/json"
  }

  # Output 2: Wazuh manager via TCP
  tcp {
    host => "localhost"
    port => 1514
    codec => json_lines
  }
}
