# =============================================================
# T-Pot Logstash Configuration — SOAR Output Addition
# File: /home/cisco/logstash.conf (copy into container)
#
# HOW TO DEPLOY:
#   sudo docker cp logstash.conf logstash:/etc/logstash/logstash.conf
#   cd /opt/tpotce && sudo docker compose restart logstash
#
# This file is the full logstash.conf for the T-Pot container.
# The SOAR integration is the http {} block in the output section.
# All other content is standard T-Pot pipeline — do not modify.
# =============================================================

# ---- OUTPUT SECTION ONLY (add this to your existing logstash.conf) ----
# Replace the existing output {} block with this:

output {
  # Standard T-Pot output — keep this unchanged
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "logstash-%{+YYYY.MM.dd}"
    template => "/etc/logstash/tpot-template.json"
    template_overwrite => "true"
  }

  # SOAR integration — forwards all events to Shuffle webhook
  # Replace WEBHOOK_ID with your actual Shuffle webhook ID
  http {
    url => "http://193.10.203.151:3001/api/v1/hooks/webhook_ca7036b6-fc1b-41c2-92db-66295f932188"
    http_method => "post"
    format => "json"
    content_type => "application/json"
  }
}
