# ============================================================
# Logstash Pipeline Configuration — SOAR Machine
# ============================================================
# Location: /etc/logstash/conf.d/logstash.conf (on SOAR machine)
# Also used inside T-Pot Logstash container
#
# Inputs:
#   - Beats (port 5044): T-Pot honeypot logs via Filebeat
#   - Syslog (port 514): FortiGate firewall logs
#
# Outputs:
#   - HTTP: Shuffle webhook (PB1-PB4 trigger)
#   - TCP:  Wazuh indexer (WZ-PB1-4 trigger)
#
# Author: Alphonse Joseph & Filmon Mehari Gebrezghi
# University West, 2026
# ============================================================

input {
  # ── T-Pot honeypot logs via Filebeat/Beats ──────────────────
  beats {
    port => 5044
    tags => ["tpot", "honeypot"]
  }

  # ── FortiGate syslog (UDP 514) ───────────────────────────────
  syslog {
    port => 514
    type => "fortigate"
    tags => ["fortigate", "ngfw"]
  }
}

filter {
  # ── Parse FortiGate syslog messages ──────────────────────────
  if "fortigate" in [tags] {
    grok {
      match => {
        "message" => [
          "date=%{DATA:fg_date} time=%{DATA:fg_time} devname=%{DATA:devname} devid=%{DATA:devid} logid=%{DATA:logid} type=%{DATA:fg_type} subtype=%{DATA:subtype} level=%{DATA:fg_level} srcip=%{IP:src_ip} dstip=%{IP:dst_ip} action=%{DATA:action} msg=%{GREEDYDATA:msg}"
        ]
      }
      tag_on_failure => ["_grok_fortigate_failure"]
    }
  }

  # ── Parse Cowrie SSH honeypot logs ───────────────────────────
  if [type] == "cowrie" {
    json {
      source => "message"
      target => "cowrie"
    }
    if [cowrie][src_ip] {
      mutate {
        add_field => { "src_ip" => "%{[cowrie][src_ip]}" }
      }
    }
  }

  # ── Parse Suricata IDS alerts ─────────────────────────────────
  if [type] == "suricata" {
    json {
      source => "message"
      target => "suricata"
    }
    if [suricata][src_ip] {
      mutate {
        add_field => { "src_ip" => "%{[suricata][src_ip]}" }
      }
    }
    if [suricata][alert][signature] {
      mutate {
        add_field => { "alert_signature" => "%{[suricata][alert][signature]}" }
      }
    }
  }

  # ── Add common fields ─────────────────────────────────────────
  mutate {
    add_field => {
      "soar_processed" => "true"
      "testbed"        => "university-west-2026"
    }
  }

  # ── Drop empty events ─────────────────────────────────────────
  if [message] =~ /^\s*$/ {
    drop {}
  }
}

output {
  # ── Output 1: Shuffle webhook (HTTP POST) ─────────────────────
  # Triggers Shuffle playbooks PB1-PB4
  http {
    url    => "http://localhost:3001/api/v1/hooks/YOUR_SHUFFLE_WEBHOOK_ID"
    format => "json"
    http_method => "post"
    headers => {
      "Content-Type" => "application/json"
    }
    # Only send alerts with a source IP
    # Comment out the conditional below to send all events
  }

  # ── Output 2: Wazuh indexer (TCP) ────────────────────────────
  # Triggers Wazuh active response WZ-PB1-4
  tcp {
    host => "localhost"
    port => 9201
    codec => json_lines
  }

  # ── Output 3: Local Elasticsearch (optional, for Kibana) ─────
  # elasticsearch {
  #   hosts => ["localhost:9200"]
  #   index => "logstash-tpot-%{+YYYY.MM.dd}"
  # }

  # ── Debug output (disable in production) ─────────────────────
  # stdout {
  #   codec => rubydebug
  # }
}
