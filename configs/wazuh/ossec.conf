<!-- ============================================================
     Wazuh ossec.conf — Active Response and Integration Config
     ============================================================
     Location: /var/ossec/etc/ossec.conf
     
     This file shows the relevant sections added for the thesis:
       1. Active response — FortiGate IP blocking (WZ-PB1)
       2. Integration — TheHive alert/case creation (WZ-PB3/4)
     
     Add these blocks to your existing ossec.conf file.
     Do NOT replace the entire file — only add these sections.
     
     Author: Alphonse Joseph & Filmon Mehari Gebrezghi
     University West, 2026
     ============================================================ -->

<ossec_config>

  <!-- ── Global Settings ────────────────────────────────────── -->
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>
    <smtp_server>smtp.example.wazuh.com</smtp_server>
    <email_from>wazuh@example.wazuh.com</email_from>
    <email_to>recipient@example.wazuh.com</email_to>
    <email_maxperhour>12</email_maxperhour>
    <email_log_source>alerts.log</email_log_source>
    <agents_disconnection_time>10m</agents_disconnection_time>
    <agents_disconnection_alert_time>0</agents_disconnection_alert_time>
  </global>

  <!-- ── Alerts Configuration ───────────────────────────────── -->
  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>12</email_alert_level>
  </alerts>

  <!-- ── Active Response: FortiGate IP Blocking (WZ-PB1) ──────
       Triggers fortigate-block.sh when rule level >= 6
       Script location: /var/ossec/active-response/bin/fortigate-block.sh
       ──────────────────────────────────────────────────────── -->
  <command>
    <name>fortigate-block</name>
    <executable>fortigate-block.sh</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <active-response>
    <command>fortigate-block</command>
    <location>local</location>
    <rules_id>5710,5712,5720,5760,40101,40111</rules_id>
    <timeout>180</timeout>
  </active-response>

  <!-- ── Integration: TheHive Alert and Case Creation ─────────
       WZ-PB2: AbuseIPDB enrichment (inside custom-thehive script)
       WZ-PB3: TheHive alert creation
       WZ-PB4: TheHive case creation (for high severity)
       ──────────────────────────────────────────────────────── -->
  <integration>
    <name>custom-thehive</name>
    <hook_url>http://localhost:9000</hook_url>
    <api_key>YOUR_THEHIVE_API_KEY</api_key> <!-- SENSITIVE — not shared. Generate in TheHive: Admin -> API Keys -->
    <level>3</level>
    <alert_format>json</alert_format>
  </integration>

  <!-- ── Remote: Agent Communication ───────────────────────── -->
  <remote>
    <connection>secure</connection>
    <port>1516</port>
    <protocol>tcp</protocol>
    <queue_size>131072</queue_size>
  </remote>

  <!-- ── Syslog Output (optional, for external SIEM) ──────── -->
  <!-- 
  <syslog_output>
    <level>9</level>
    <server>YOUR_SIEM_IP</server>
    <port>514</port>
    <format>default</format>
  </syslog_output>
  -->

  <!-- ── Ruleset ────────────────────────────────────────────── -->
  <ruleset>
    <decoder_dir>ruleset/decoders</decoder_dir>
    <rule_dir>ruleset/rules</rule_dir>
    <rule_exclude>0215-policy_rules.xml</rule_exclude>
    <list>etc/lists/audit-keys</list>
    <list>etc/lists/amazon/aws-eventnames</list>
    <list>etc/lists/security-eventchannel</list>
  </ruleset>

  <!-- ── Log Analysis ───────────────────────────────────────── -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>command</log_format>
    <command>df -P</command>
    <frequency>360</frequency>
  </localfile>

  <localfile>
    <log_format>full_command</log_format>
    <command>netstat -tulpn | sed 's/\([[:alnum:]]\+\)\ \+[[:digit:]]\+\ \+[[:digit:]]\+\ \+\(.*\):\([[:digit:]]*\)\ \+\([0-9\.\:\*]\+\).\+\ \([[:digit:]]*\/[[:alnum:]\-]*\).*/\1 \2 == \3 == \4 \5/' | sort -k 4 -g | sed 's/ == \(.*\) ==/:\1/' | sed 1,2d</command>
    <alias>netstat listening ports</alias>
    <frequency>360</frequency>
  </localfile>

</ossec_config>
