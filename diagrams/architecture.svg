<text x="369" y="264" font-size="9.5" fill="#333">IP blocking (FortiGate)</text>
<text x="369" y="278" font-size="9.5" fill="#333">AbuseIPDB enrichment</text>
<text x="369" y="292" font-size="9.5" fill="#333">TheHive notification</text>
<text x="369" y="306" font-size="9.5" fill="#333">TheHive case creation</text>
<text x="369" y="322" font-size="9.5" fill="#7b241c" font-weight="bold">Wazuh WZ-PB1-4:</text>
<text x="369" y="336" font-size="9.5" fill="#333">Same 4 actions via</text>
<text x="369" y="350" font-size="9.5" fill="#333">active response</text>
<text x="369" y="376" font-size="9.5" fill="#333">Avg latency:</text>
<text x="369" y="390" font-size="9.5" fill="#4a148c">Shuffle: 2.5 s</text>
<text x="369" y="404" font-size="9.5" fill="#7b241c">Wazuh:  0.4 s</text>

